# ReferralPrep CI/CD pipeline
# Builds native binaries for Linux, macOS (Apple Silicon), and Windows on every
# push to main, then publishes them as a public GitHub Release anyone can download.

name: Build and release binaries

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    # Do not let one slow runner hang the whole pipeline for 24 hours.
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 64-bit (x86_64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: linux-x86_64
            artifact: referralprep-linux-x86_64
            binary: referralprep

          # Linux ARM 64-bit (aarch64) - required by the exam brief
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            label: linux-aarch64
            artifact: referralprep-linux-aarch64
            binary: referralprep
            cross: true

          # macOS Apple Silicon (M1, M2, M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            artifact: referralprep-macos-arm64
            binary: referralprep

          # Windows 64-bit
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x86_64
            artifact: referralprep-windows-x86_64.exe
            binary: referralprep.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler for Linux aarch64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for upload (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Rename binary for upload (Windows)
        if: matrix.os == 'windows-latest'
        run: copy target\${{ matrix.target }}\release\${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload binary as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    # Publish even if one build was skipped or failed, as long as some succeeded.
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Publish binaries to the latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: >
            Native binaries built from the most recent push to main.
            Download the file for your system, then run it from a terminal.
          files: binaries/*
